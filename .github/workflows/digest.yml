name: Daily VC deals digest

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 13:30 UTC, Mon-Fri (markets-day cadence)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'vc-deals' }}
          DEALS_PER_DIGEST: ${{ vars.DEALS_PER_DIGEST || '8' }}
          MARKET_PER_DIGEST: ${{ vars.MARKET_PER_DIGEST || '3' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '30' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit dedup state
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [ -f data/seen.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f data/seen.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update dedup state [skip ci]"
              git push
            fi
          fi
